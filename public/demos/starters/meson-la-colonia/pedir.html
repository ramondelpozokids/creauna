<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
  <title>Pedir | Mesón La Colonia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root { --color-bg:#faf9f6; --color-text:#1a1a1a; --color-text-light:#6b7280; --color-accent:#b8954a; --color-accent-dark:#8b6f3a; --color-white:#fff; --color-border:#e8e5de; --radius:16px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',sans-serif; background:var(--color-bg); color:var(--color-text); min-height:100vh; padding-bottom:120px; }
    .pedir-header { background:linear-gradient(135deg,#1a1a1a,#2d2d2d); color:white; padding:1.25rem 1.5rem; position:sticky; top:0; z-index:30; box-shadow:0 4px 20px rgba(0,0,0,.15); }
    .pedir-header-inner { max-width:640px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; gap:1rem; }
    .pedir-header a { color:var(--color-accent); text-decoration:none; font-weight:600; }
    .pedir-header h1 { font-family:'Playfair Display',serif; font-size:1.35rem; }
    #mesa-badge { display:none; font-size:.75rem; background:rgba(184,149,74,.2); color:#d4b978; padding:.25rem .65rem; border-radius:999px; font-weight:700; }
    .cats { max-width:640px; margin:0 auto; padding:1rem 1.5rem; display:flex; gap:.5rem; overflow-x:auto; position:sticky; top:68px; z-index:20; background:var(--color-bg); border-bottom:1px solid var(--color-border); }
    .cat-btn { border:none; padding:.55rem 1rem; border-radius:999px; font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; cursor:pointer; white-space:nowrap; background:var(--color-white); color:var(--color-text-light); border:1px solid var(--color-border); }
    .cat-btn.active { background:var(--color-accent); color:white; border-color:var(--color-accent); }
    #items { max-width:640px; margin:0 auto; padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }
    .item-card { background:white; border:1px solid var(--color-border); border-radius:var(--radius); padding:1.25rem; display:flex; justify-content:space-between; gap:1rem; align-items:flex-start; box-shadow:0 2px 12px rgba(0,0,0,.04); }
    .item-card h3 { font-family:'Playfair Display',serif; font-size:1.1rem; margin-bottom:.35rem; }
    .item-card p { color:var(--color-text-light); font-size:.9rem; line-height:1.5; }
    .item-price { color:var(--color-accent); font-weight:700; font-family:'Playfair Display',serif; margin-top:.5rem; display:block; }
    .add-btn { width:42px; height:42px; border-radius:50%; border:none; background:var(--color-accent); color:white; font-size:1.4rem; font-weight:700; cursor:pointer; flex-shrink:0; }
    .add-btn:hover { background:var(--color-accent-dark); }
    #cart-bar { display:none; position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid var(--color-border); box-shadow:0 -8px 30px rgba(0,0,0,.1); z-index:40; padding:1rem 1.5rem; }
    #cart-bar.visible { display:block; }
    .cart-inner { max-width:640px; margin:0 auto; }
    #cart-list { max-height:140px; overflow-y:auto; margin:1rem 0; }
    .cart-row { display:flex; justify-content:space-between; padding:.5rem 0; border-bottom:1px solid var(--color-border); font-size:.9rem; }
    .cart-row button { background:none; border:none; color:#dc2626; cursor:pointer; }
    #send-order { width:100%; padding:1rem; border:none; border-radius:999px; background:#25D366; color:white; font-weight:700; font-size:1.05rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:.5rem; }
    #send-order:hover { background:#128C7E; }
  </style>
</head>
<body>
  <header class="pedir-header">
    <div class="pedir-header-inner">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Volver</a>
      <div style="text-align:right"><h1>La Carta</h1><span id="mesa-badge"></span></div>
    </div>
  </header>
  <div id="cats" class="cats"></div>
  <div id="items"></div>
  <div id="cart-bar">
    <div class="cart-inner">
      <strong>Tu pedido (<span id="cart-count">0</span>)</strong>
      <div id="cart-list"></div>
      <button type="button" id="send-order"><i class="fab fa-whatsapp"></i> Enviar pedido por WhatsApp</button>
    </div>
  </div>
  <script>
    const BUSINESS_NAME = "Mesón La Colonia";
    const WHATSAPP = "34624691930";
    const MENU = [{"id":1,"category":"ensaladas","categoryLabel":"Ensaladas","name":"Ensaladilla rusa","desc":"","price":11,"priceLabel":"11,00€"},{"id":2,"category":"ensaladas","categoryLabel":"Ensaladas","name":"Piquillo de atún","desc":"","price":11,"priceLabel":"11,00€"},{"id":3,"category":"ensaladas","categoryLabel":"Ensaladas","name":"Ensalada mixta","desc":"","price":12,"priceLabel":"12,00€"},{"id":4,"category":"ensaladas","categoryLabel":"Ensaladas","name":"Tomate con burrata","desc":"","price":14,"priceLabel":"14,00€"},{"id":5,"category":"raciones","categoryLabel":"Raciones","name":"Patatas bravas o Ali-Oli","desc":"","price":8.5,"priceLabel":"8,50€"},{"id":6,"category":"raciones","categoryLabel":"Raciones","name":"Patatas mixtas","desc":"","price":10,"priceLabel":"10,00€"},{"id":7,"category":"raciones","categoryLabel":"Raciones","name":"Alitas de pollo","desc":"","price":13,"priceLabel":"13,00€"},{"id":8,"category":"raciones","categoryLabel":"Raciones","name":"Tiras de pollo","desc":"","price":13,"priceLabel":"13,00€"},{"id":9,"category":"raciones","categoryLabel":"Raciones","name":"Croquetas de jamón","desc":"","price":13,"priceLabel":"13,00€"},{"id":10,"category":"raciones","categoryLabel":"Raciones","name":"Berenjena rebozadas","desc":"","price":13,"priceLabel":"13,00€"},{"id":11,"category":"raciones","categoryLabel":"Raciones","name":"Oreja a la plancha","desc":"","price":13,"priceLabel":"13,00€"},{"id":12,"category":"raciones","categoryLabel":"Raciones","name":"Morcilla de burgos","desc":"","price":13,"priceLabel":"13,00€"},{"id":13,"category":"raciones","categoryLabel":"Raciones","name":"Calamares","desc":"","price":13,"priceLabel":"13,00€"},{"id":14,"category":"raciones","categoryLabel":"Raciones","name":"Chorizo a la sidra","desc":"","price":13,"priceLabel":"13,00€"},{"id":15,"category":"raciones","categoryLabel":"Raciones","name":"Boquerones fritos","desc":"","price":13.5,"priceLabel":"13,50€"},{"id":16,"category":"raciones","categoryLabel":"Raciones","name":"Huevos rotos con jamón o chistorra","desc":"","price":14,"priceLabel":"14,00€"},{"id":17,"category":"raciones","categoryLabel":"Raciones","name":"Chopitos","desc":"","price":16,"priceLabel":"16,00€"},{"id":18,"category":"raciones","categoryLabel":"Raciones","name":"Parrillada de verduras","desc":"","price":16,"priceLabel":"16,00€"},{"id":19,"category":"raciones","categoryLabel":"Raciones","name":"Fritura de pescado","desc":"","price":16,"priceLabel":"16,00€"},{"id":20,"category":"raciones","categoryLabel":"Raciones","name":"Gambas al ajillo","desc":"","price":16,"priceLabel":"16,00€"},{"id":21,"category":"hamburguesas","categoryLabel":"Hamburguesas","name":"Clásica","desc":"Carne de ternera, con lechuga, tomate y queso","price":13,"priceLabel":"13,00€"},{"id":22,"category":"hamburguesas","categoryLabel":"Hamburguesas","name":"Completa","desc":"Carne de ternera con huevo, Jamón York, queso, lechuga y tomate","price":15,"priceLabel":"15,00€"},{"id":23,"category":"hamburguesas","categoryLabel":"Hamburguesas","name":"De la casa","desc":"Carne de ternera, bacon crujiente, cebolla caramelizada, queso de cabra y queso fundido","price":16,"priceLabel":"16,00€"},{"id":24,"category":"principal","categoryLabel":"Principal","name":"Sepia a la plancha","desc":"","price":15,"priceLabel":"15,00€"},{"id":25,"category":"principal","categoryLabel":"Principal","name":"Secreto ibérico","desc":"","price":16,"priceLabel":"16,00€"},{"id":26,"category":"principal","categoryLabel":"Principal","name":"Aguja ibérica","desc":"","price":16,"priceLabel":"16,00€"},{"id":27,"category":"principal","categoryLabel":"Principal","name":"Emperador","desc":"","price":18,"priceLabel":"18,00€"},{"id":28,"category":"principal","categoryLabel":"Principal","name":"Entrecot","desc":"","price":19,"priceLabel":"19,00€"},{"id":29,"category":"principal","categoryLabel":"Principal","name":"Cachopo asturiano","desc":"","price":21,"priceLabel":"21,00€"},{"id":30,"category":"postres","categoryLabel":"Postres","name":"Pudín / Flan casero","desc":"","price":4,"priceLabel":"4,00€"},{"id":31,"category":"postres","categoryLabel":"Postres","name":"Tartas caseras variadas","desc":"","price":5.5,"priceLabel":"5,50€"},{"id":32,"category":"desayunos","categoryLabel":"Desayunos y Meriendas","name":"Tostada con tomate","desc":"Media 2,80€ / Entera 3,70€","price":0,"priceLabel":""},{"id":33,"category":"desayunos","categoryLabel":"Desayunos y Meriendas","name":"Tostada con tomate y lacón","desc":"Media 3,80€ / Entera 4,80€","price":0,"priceLabel":""},{"id":34,"category":"desayunos","categoryLabel":"Desayunos y Meriendas","name":"Tostada con tomate y jamón serrano","desc":"Media 3,80€ / Entera 4,80€","price":0,"priceLabel":""},{"id":35,"category":"desayunos","categoryLabel":"Desayunos y Meriendas","name":"Tostada con tomate y aguacate","desc":"Media 3,80€ / Entera 4,80€","price":0,"priceLabel":""},{"id":36,"category":"desayunos","categoryLabel":"Desayunos y Meriendas","name":"Cruasán","desc":"","price":3.7,"priceLabel":"3,70€"},{"id":37,"category":"desayunos","categoryLabel":"Desayunos y Meriendas","name":"Cruasán Mixto","desc":"","price":5.5,"priceLabel":"5,50€"},{"id":38,"category":"desayunos","categoryLabel":"Desayunos y Meriendas","name":"Sándwich Mixto","desc":"","price":5.8,"priceLabel":"5,80€"},{"id":39,"category":"desayunos","categoryLabel":"Desayunos y Meriendas","name":"Desayuno Americano","desc":"","price":6.5,"priceLabel":"6,50€"}];
    const params = new URLSearchParams(location.search);
    const mesa = params.get('mesa');
    let active = 'all';
    let cart = [];
    if (mesa) {
      const b = document.getElementById('mesa-badge');
      b.textContent = 'MESA ' + mesa;
      b.style.display = 'inline-block';
    }
    const categories = [{ id: 'all', label: 'Todo' }].concat(
      [...new Map(MENU.map(i => [i.category, i.categoryLabel])).entries()].map(([id, label]) => ({ id, label }))
    );
    const catsEl = document.getElementById('cats');
    categories.forEach(c => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = c.label;
      btn.className = 'cat-btn' + (c.id === active ? ' active' : '');
      btn.dataset.cat = c.id;
      btn.onclick = () => { active = c.id; render(); };
      catsEl.appendChild(btn);
    });
    function render() {
      catsEl.querySelectorAll('.cat-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === active);
      });
      const list = active === 'all' ? MENU : MENU.filter(i => i.category === active);
      document.getElementById('items').innerHTML = list.map(i =>
        '<div class="item-card"><div><h3>' + i.name + '</h3>' +
        (i.desc ? '<p>' + i.desc + '</p>' : '') +
        '<span class="item-price">' + (i.priceLabel || (i.price ? i.price.toFixed(2) + ' €' : '')) + '</span></div>' +
        '<button type="button" class="add-btn" data-id="' + i.id + '">+</button></div>'
      ).join('');
      document.querySelectorAll('.add-btn').forEach(b => b.onclick = () => {
        const item = MENU.find(x => x.id === +b.dataset.id);
        if (item) { cart.push(item); updateCart(); }
      });
    }
    function updateCart() {
      const bar = document.getElementById('cart-bar');
      if (!cart.length) { bar.classList.remove('visible'); return; }
      bar.classList.add('visible');
      document.getElementById('cart-count').textContent = cart.length;
      document.getElementById('cart-list').innerHTML = cart.map((item, i) =>
        '<div class="cart-row"><span>' + item.name + '</span><button type="button" data-i="' + i + '">✕</button></div>'
      ).join('');
      document.querySelectorAll('#cart-list button').forEach(b => b.onclick = () => {
        cart.splice(+b.dataset.i, 1);
        updateCart();
      });
    }
    document.getElementById('send-order').onclick = () => {
      if (!cart.length) return;
      let msg = 'Hola ' + BUSINESS_NAME + ' 👋\n';
      if (mesa) msg += '📍 Mesa ' + mesa + '\n\n';
      msg += '*Mi pedido:*\n';
      cart.forEach((item, i) => {
        msg += (i + 1) + '. ' + item.name;
        if (item.priceLabel) msg += ' (' + item.priceLabel + ')';
        else if (item.price) msg += ' (' + item.price.toFixed(2) + '€)';
        msg += '\n';
      });
      const total = cart.reduce((s, i) => s + (i.price || 0), 0);
      if (total > 0) msg += '\n💰 *Total: ' + total.toFixed(2) + '€*';
      window.open('https://wa.me/' + WHATSAPP + '?text=' + encodeURIComponent(msg), '_blank');
    };
    render();
  </script>
</body>
</html>
